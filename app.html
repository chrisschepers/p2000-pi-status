<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>P2000 Alarm — app-statistieken</title>
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
<style>
  :root {
    --page:          #f9f9f7;
    --surface-1:     #fcfcfb;
    --text-primary:  #0b0b0b;
    --text-secondary:#52514e;
    --muted:         #898781;
    --grid:          #e1e0d9;
    --baseline:      #c3c2b7;
    --border:        rgba(11,11,11,0.10);
    --series-1:      #2a78d6;
    --good:          #0ca30c;
    --warning:       #fab219;
    --critical:      #d03b3b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page:          #0d0d0d;
      --surface-1:     #1a1a19;
      --text-primary:  #ffffff;
      --text-secondary:#c3c2b7;
      --muted:         #898781;
      --grid:          #2c2c2a;
      --baseline:      #383835;
      --border:        rgba(255,255,255,0.10);
      --series-1:      #3987e5;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--page);
    color: var(--text-primary);
    font: 15px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 16px 14px calc(24px + env(safe-area-inset-bottom));
    max-width: 560px;
    margin: 0 auto;
  }
  header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
  h1 { font-size: 19px; font-weight: 650; }
  .updated { margin-left: auto; font-size: 12px; color: var(--muted); }
  .nav { display: flex; gap: 8px; margin-bottom: 12px; }
  .nav a {
    font-size: 12px; color: var(--text-secondary); text-decoration: none;
    border: 1px solid var(--border); border-radius: 999px; padding: 4px 11px;
    background: var(--surface-1);
  }
  .nav a.active { color: var(--text-primary); font-weight: 600; }
  .statusline { display: flex; align-items: center; gap: 7px; font-size: 14px;
                color: var(--text-secondary); margin-bottom: 14px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); flex: none; }
  .dot.good { background: var(--good); }
  .dot.critical { background: var(--critical); }

  .tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .tile {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px 11px;
  }
  .tile .label { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
  .tile .value { font-size: 24px; font-weight: 650; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
  .tile .value small { font-size: 14px; font-weight: 500; color: var(--text-secondary); }
  .tile .sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .tile .sub.good { color: var(--good); }
  .tile.hero .value { font-size: 30px; }

  section.chart {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 14px 10px;
    margin-top: 10px;
  }
  .chart h2 { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; }
  .plot { position: relative; height: 132px; }
  .gridline { position: absolute; left: 0; right: 0; border-top: 1px solid var(--grid); }
  .gridline span { position: absolute; right: 0; top: -15px; font-size: 10px;
                   color: var(--muted); font-variant-numeric: tabular-nums; }
  .bars { position: absolute; inset: 0; display: flex; align-items: flex-end; gap: 2px; }
  .col { flex: 1 1 0; height: 100%; display: flex; align-items: flex-end; min-width: 0; }
  .bar { width: 100%; background: var(--series-1); border-radius: 4px 4px 0 0; min-height: 2px; }
  .col.hover .bar { filter: brightness(1.25); }
  .baseline { border-top: 1px solid var(--baseline); margin-top: 0; }
  .xlabels { display: flex; justify-content: space-between; font-size: 10px;
             color: var(--muted); margin-top: 4px; font-variant-numeric: tabular-nums; }
  .tooltip {
    position: absolute; bottom: calc(100% + 6px); transform: translateX(-50%);
    background: var(--text-primary); color: var(--page);
    font-size: 12px; padding: 4px 8px; border-radius: 6px; white-space: nowrap;
    pointer-events: none; display: none; z-index: 2;
  }
  details { margin-top: 10px; }
  summary { font-size: 12px; color: var(--muted); cursor: pointer; }
  table { width: 100%; border-collapse: collapse; margin-top: 6px; font-size: 13px; }
  td { padding: 3px 6px; border-top: 1px solid var(--grid); font-variant-numeric: tabular-nums; }
  td:last-child { text-align: right; }
  .foot { margin-top: 14px; font-size: 11px; color: var(--muted); text-align: center; }
  .error {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px; color: var(--text-secondary); font-size: 14px; margin-bottom: 10px;
    display: none;
  }
</style>
</head>
<body>
  <header>
    <h1>📈 P2000 Alarm — app</h1>
    <span class="updated" id="updated">—</span>
  </header>
  <div class="nav">
    <a href="./">📡 Ontvanger</a>
    <a href="./app.html" class="active">📈 App-stats</a>
  </div>
  <div class="statusline"><span class="dot" id="dot"></span><span id="statustext">Laden…</span></div>

  <div class="error" id="error"></div>

  <div class="tiles">
    <div class="tile hero">
      <div class="label">Downloads vandaag</div>
      <div class="value" id="today">—</div>
      <div class="sub" id="todaysub"></div>
    </div>
    <div class="tile hero">
      <div class="label">Downloads totaal</div>
      <div class="value" id="total">—</div>
      <div class="sub" id="totalsub"></div>
    </div>
    <div class="tile">
      <div class="label">Laatste 7 dagen</div>
      <div class="value" id="week">—</div>
      <div class="sub" id="weeksub"></div>
    </div>
    <div class="tile">
      <div class="label">Actief vandaag</div>
      <div class="value" id="active">—</div>
      <div class="sub" id="activesub"></div>
    </div>
    <div class="tile">
      <div class="label">Push aan</div>
      <div class="value" id="push">—</div>
      <div class="sub" id="pushsub"></div>
    </div>
    <div class="tile">
      <div class="label">A0-monitors</div>
      <div class="value" id="vol">—</div>
      <div class="sub" id="volsub"></div>
    </div>
  </div>

  <section class="chart">
    <h2>Nieuwe installaties per dag — afgelopen 30 dagen</h2>
    <div class="plot" id="plot"></div>
    <div class="baseline"></div>
    <div class="xlabels" id="xlabels"></div>
    <details>
      <summary>Bekijk als tabel</summary>
      <table id="tabel"></table>
    </details>
  </section>

  <div class="foot">Ververst elke 60 s · App Store + Google Play samen (unieke installaties)</div>

<script>
const API = 'https://p2000alarm-production.up.railway.app/api/public/stats';
const TIME_FMT = new Intl.DateTimeFormat('nl-NL', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Amsterdam' });
const DAY_FMT = new Intl.DateTimeFormat('nl-NL', { day: 'numeric', month: 'short', timeZone: 'Europe/Amsterdam' });
const NUM = (n) => (n ?? 0).toLocaleString('nl-NL');
const $ = (id) => document.getElementById(id);

function renderChart(daily) {
  // Laatste 30 dagen; de dag-strings van de API zijn al NL-datums.
  const days = (daily || []).slice(-30);
  const max = Math.max(1, ...days.map((d) => d.count));
  const plot = $('plot');
  plot.innerHTML = '';
  for (const frac of [0, 0.5]) {
    const g = document.createElement('div');
    g.className = 'gridline';
    g.style.top = `${frac * 100}%`;
    g.innerHTML = `<span>${Math.round(max * (1 - frac))}</span>`;
    plot.appendChild(g);
  }
  const bars = document.createElement('div');
  bars.className = 'bars';
  const tip = document.createElement('div');
  tip.className = 'tooltip';
  plot.appendChild(tip);
  days.forEach((d, i) => {
    const col = document.createElement('div');
    col.className = 'col';
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.height = `${Math.max(1.5, (d.count / max) * 100)}%`;
    // vandaag is nog niet compleet — gedempt weergeven
    if (i === days.length - 1) bar.style.opacity = '0.45';
    col.appendChild(bar);
    const label = `${DAY_FMT.format(new Date(d.date + 'T12:00:00'))}: ${NUM(d.count)}`;
    const show = () => {
      document.querySelectorAll('.col.hover').forEach((c) => c.classList.remove('hover'));
      col.classList.add('hover');
      tip.textContent = label;
      tip.style.display = 'block';
      tip.style.left = `${col.offsetLeft + col.offsetWidth / 2}px`;
    };
    col.addEventListener('pointerenter', show);
    col.addEventListener('pointerdown', show);
    col.addEventListener('pointerleave', () => { col.classList.remove('hover'); tip.style.display = 'none'; });
    bars.appendChild(col);
  });
  plot.appendChild(bars);

  if (days.length) {
    const f = (s) => DAY_FMT.format(new Date(s + 'T12:00:00'));
    $('xlabels').innerHTML = `<span>${f(days[0].date)}</span>` +
      (days.length > 2 ? `<span>${f(days[Math.floor(days.length / 2)].date)}</span>` : '') +
      `<span>${f(days[days.length - 1].date)}</span>`;
    $('tabel').innerHTML = days.slice().reverse()
      .map((d) => `<tr><td>${f(d.date)}</td><td>${NUM(d.count)}</td></tr>`).join('');
  }
  return days;
}

async function refresh() {
  try {
    const res = await fetch(API, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const s = (await res.json()).data;
    $('error').style.display = 'none';

    $('dot').className = 'dot good';
    // Recorddag uit de reeks als context in de statusregel.
    const days = s.dailyInstalls || [];
    const record = days.reduce((a, b) => (b.count > (a?.count ?? 0) ? b : a), null);
    $('statustext').textContent = record
      ? `Live · record: ${NUM(record.count)} op ${DAY_FMT.format(new Date(record.date + 'T12:00:00'))}`
      : 'Live gebruikersdata';

    $('today').textContent = NUM(s.newToday);
    $('todaysub').textContent = `gisteren: ${NUM(s.newYesterday)}`;
    $('todaysub').className = 'sub' + (s.newToday >= s.newYesterday ? ' good' : '');
    $('total').textContent = NUM(s.totalDevices);
    $('totalsub').textContent = s.firstInstallAt
      ? `sinds ${DAY_FMT.format(new Date(s.firstInstallAt))}` : '';
    $('week').textContent = NUM(s.newLast7Days);
    $('weeksub').textContent = `30 dagen: ${NUM(s.newLast30Days)}`;
    $('active').textContent = NUM(s.activeToday);
    $('activesub').textContent = `deze week: ${NUM(s.activeLast7Days)}`;
    $('push').textContent = NUM(s.withPushToken);
    $('pushsub').textContent = s.totalDevices
      ? `${Math.round(100 * s.withPushToken / s.totalDevices)}% van alle installaties` : '';
    $('vol').textContent = NUM(s.volunteers);
    $('volsub').textContent = `${NUM(s.availableVolunteers)} beschikbaar`;

    renderChart(days);
    $('updated').textContent = 'ververst ' + TIME_FMT.format(new Date());
  } catch (err) {
    const e = $('error');
    e.style.display = 'block';
    e.textContent = 'Kan de backend niet bereiken (' + err.message + '). Probeer het straks opnieuw.';
    $('dot').className = 'dot critical';
    $('statustext').textContent = 'Geen verbinding met backend';
  }
}

refresh();
setInterval(refresh, 60_000);
document.addEventListener('visibilitychange', () => { if (!document.hidden) refresh(); });
</script>
</body>
</html>
