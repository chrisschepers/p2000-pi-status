<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>P2000 Ontvanger — status</title>
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>">
<style>
  :root {
    --page:          #f9f9f7;
    --surface-1:     #fcfcfb;
    --text-primary:  #0b0b0b;
    --text-secondary:#52514e;
    --muted:         #898781;
    --grid:          #e1e0d9;
    --baseline:      #c3c2b7;
    --border:        rgba(11,11,11,0.10);
    --series-1:      #2a78d6;
    --good:          #0ca30c;
    --warning:       #fab219;
    --critical:      #d03b3b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page:          #0d0d0d;
      --surface-1:     #1a1a19;
      --text-primary:  #ffffff;
      --text-secondary:#c3c2b7;
      --muted:         #898781;
      --grid:          #2c2c2a;
      --baseline:      #383835;
      --border:        rgba(255,255,255,0.10);
      --series-1:      #3987e5;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    background: var(--page);
    color: var(--text-primary);
    font: 15px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
    padding: 16px 14px calc(24px + env(safe-area-inset-bottom));
    max-width: 560px;
    margin: 0 auto;
  }
  header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
  h1 { font-size: 19px; font-weight: 650; }
  .updated { margin-left: auto; font-size: 12px; color: var(--muted); }
  .statusline { display: flex; align-items: center; gap: 7px; font-size: 14px;
                color: var(--text-secondary); margin-bottom: 14px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--muted); flex: none; }
  .dot.good { background: var(--good); }
  .dot.warning { background: var(--warning); }
  .dot.critical { background: var(--critical); }

  .tiles { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .tile {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px 11px;
  }
  .tile .label { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
  .tile .value { font-size: 24px; font-weight: 650; letter-spacing: -0.01em; }
  .tile .value small { font-size: 14px; font-weight: 500; color: var(--text-secondary); }
  .tile .sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .tile .sub.good { color: var(--good); }
  .tile .sub.warn { color: var(--warning); }
  .tile .sub.crit { color: var(--critical); }

  section.chart {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 14px 10px;
    margin-top: 10px;
  }
  .chart h2 { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px; }
  .plot { position: relative; height: 132px; }
  .gridline { position: absolute; left: 0; right: 0; border-top: 1px solid var(--grid); }
  .gridline span { position: absolute; right: 0; top: -15px; font-size: 10px;
                   color: var(--muted); font-variant-numeric: tabular-nums; }
  .bars { position: absolute; inset: 0; display: flex; align-items: flex-end; gap: 2px; }
  .col { flex: 1 1 0; height: 100%; display: flex; align-items: flex-end; min-width: 0; }
  .bar { width: 100%; background: var(--series-1); border-radius: 4px 4px 0 0; min-height: 2px; }
  .col.hover .bar { filter: brightness(1.25); }
  .baseline { border-top: 1px solid var(--baseline); margin-top: 0; }
  .xlabels { display: flex; justify-content: space-between; font-size: 10px;
             color: var(--muted); margin-top: 4px; font-variant-numeric: tabular-nums; }
  .tooltip {
    position: absolute; bottom: calc(100% + 6px); transform: translateX(-50%);
    background: var(--text-primary); color: var(--page);
    font-size: 12px; padding: 4px 8px; border-radius: 6px; white-space: nowrap;
    pointer-events: none; display: none; z-index: 2;
  }
  details { margin-top: 10px; }
  summary { font-size: 12px; color: var(--muted); cursor: pointer; }
  table { width: 100%; border-collapse: collapse; margin-top: 6px; font-size: 13px; }
  td { padding: 3px 6px; border-top: 1px solid var(--grid); font-variant-numeric: tabular-nums; }
  td:last-child { text-align: right; }
  .foot { margin-top: 14px; font-size: 11px; color: var(--muted); text-align: center; }
  .error {
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px; color: var(--text-secondary); font-size: 14px; margin-bottom: 10px;
    display: none;
  }
</style>
</head>
<body>
  <header>
    <h1>📡 P2000 Ontvanger</h1>
    <span class="updated" id="updated">—</span>
  </header>
  <div class="statusline"><span class="dot" id="dot"></span><span id="statustext">Laden…</span></div>

  <div class="error" id="error"></div>

  <div class="tiles">
    <div class="tile">
      <div class="label">Temperatuur</div>
      <div class="value" id="temp">—</div>
      <div class="sub" id="tempsub"></div>
    </div>
    <div class="tile">
      <div class="label">Aan sinds</div>
      <div class="value" id="uptime">—</div>
      <div class="sub" id="uptimesub"></div>
    </div>
    <div class="tile">
      <div class="label">Meldingen (laatste uur)</div>
      <div class="value" id="lasthour">—</div>
      <div class="sub" id="lastline"></div>
    </div>
    <div class="tile">
      <div class="label">Dekking (laatste uur)</div>
      <div class="value" id="coverage">—</div>
      <div class="sub" id="coveragesub"></div>
    </div>
  </div>

  <section class="chart">
    <h2>Meldingen per uur — afgelopen 24 uur</h2>
    <div class="plot" id="plot"></div>
    <div class="baseline"></div>
    <div class="xlabels" id="xlabels"></div>
    <details>
      <summary>Bekijk als tabel</summary>
      <table id="tabel"></table>
    </details>
  </section>

  <div class="tiles" style="margin-top:10px">
    <div class="tile">
      <div class="label">Decoder-herstarts</div>
      <div class="value" id="restarts">—</div>
    </div>
    <div class="tile">
      <div class="label">Wachtrij / fouten</div>
      <div class="value" id="spool">—</div>
      <div class="sub" id="spoolsub"></div>
    </div>
  </div>

  <div class="foot">Ververst elke 60 s · bron: pi-chris-1 · <span id="gen">—</span></div>

<script>
const API = 'https://p2000alarm-production.up.railway.app/api/public/pi-status';
const HOUR_FMT = new Intl.DateTimeFormat('nl-NL', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Amsterdam' });
const $ = (id) => document.getElementById(id);

function fmtUptime(sec) {
  if (sec == null) return '—';
  const d = Math.floor(sec / 86400), h = Math.floor((sec % 86400) / 3600), m = Math.floor((sec % 3600) / 60);
  if (d > 0) return `${d}<small>d</small> ${h}<small>u</small>`;
  if (h > 0) return `${h}<small>u</small> ${m}<small>m</small>`;
  return `${m}<small>min</small>`;
}
function ago(iso) {
  if (!iso) return null;
  const s = Math.round((Date.now() - new Date(iso).getTime()) / 1000);
  if (s < 90) return `${s}s geleden`;
  if (s < 5400) return `${Math.round(s / 60)}m geleden`;
  return `${(s / 3600).toFixed(1)}u geleden`;
}

function renderChart(perHour) {
  // 24 buckets opbouwen, ontbrekende uren = 0
  const byHour = new Map(perHour.map((r) => [new Date(r.hour).getTime(), r.n]));
  const now = new Date(); now.setMinutes(0, 0, 0);
  const buckets = [];
  for (let i = 23; i >= 0; i--) {
    const t = now.getTime() - i * 3600_000;
    buckets.push({ t, n: byHour.get(t) ?? 0 });
  }
  const max = Math.max(1, ...buckets.map((b) => b.n));
  const plot = $('plot');
  plot.innerHTML = '';
  // recessieve gridlijnen: max en helft
  for (const frac of [0, 0.5]) {
    const g = document.createElement('div');
    g.className = 'gridline';
    g.style.top = `${frac * 100}%`;
    g.innerHTML = `<span>${Math.round(max * (1 - frac))}</span>`;
    plot.appendChild(g);
  }
  const bars = document.createElement('div');
  bars.className = 'bars';
  const tip = document.createElement('div');
  tip.className = 'tooltip';
  plot.appendChild(tip);
  buckets.forEach((b, i) => {
    const col = document.createElement('div');
    col.className = 'col';
    const bar = document.createElement('div');
    bar.className = 'bar';
    bar.style.height = `${Math.max(1.5, (b.n / max) * 100)}%`;
    // laatste (lopende) uur is nog onvolledig — gedempt weergeven
    if (i === buckets.length - 1) bar.style.opacity = '0.45';
    col.appendChild(bar);
    const label = `${HOUR_FMT.format(new Date(b.t)).replace(':00','')}–${HOUR_FMT.format(new Date(b.t + 3600_000)).replace(':00','')} u: ${b.n}`;
    const show = () => {
      document.querySelectorAll('.col.hover').forEach((c) => c.classList.remove('hover'));
      col.classList.add('hover');
      tip.textContent = label;
      tip.style.display = 'block';
      tip.style.left = `${col.offsetLeft + col.offsetWidth / 2}px`;
    };
    col.addEventListener('pointerenter', show);
    col.addEventListener('pointerdown', show);
    col.addEventListener('pointerleave', () => { col.classList.remove('hover'); tip.style.display = 'none'; });
    bars.appendChild(col);
  });
  plot.appendChild(bars);

  const first = HOUR_FMT.format(new Date(buckets[0].t));
  const mid = HOUR_FMT.format(new Date(buckets[12].t));
  const last = HOUR_FMT.format(new Date(buckets[23].t));
  $('xlabels').innerHTML = `<span>${first}</span><span>${mid}</span><span>${last}</span>`;

  $('tabel').innerHTML = buckets.slice().reverse()
    .map((b) => `<tr><td>${HOUR_FMT.format(new Date(b.t))}</td><td>${b.n}</td></tr>`).join('');

  return buckets;
}

async function refresh() {
  try {
    const res = await fetch(API, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    $('error').style.display = 'none';

    const rx = data.receivers && data.receivers[0];
    const hbAge = rx ? rx.heartbeatAgeSec : null;

    // Status: heartbeat < 3 min = online; < 15 min = haperend; anders offline
    const dot = $('dot');
    dot.className = 'dot';
    if (hbAge != null && hbAge < 180) { dot.classList.add('good'); $('statustext').textContent = '● Online — ontvanger draait'; }
    else if (hbAge != null && hbAge < 900) { dot.classList.add('warning'); $('statustext').textContent = '▲ Haperend — laatste hartslag ' + Math.round(hbAge / 60) + ' min geleden'; }
    else { dot.classList.add('critical'); $('statustext').textContent = '✕ Offline — geen hartslag' + (hbAge != null ? ' sinds ' + Math.round(hbAge / 60) + ' min' : ''); }

    if (rx) {
      $('temp').innerHTML = rx.cpuTemp != null ? `${rx.cpuTemp.toFixed(1)}<small> °C</small>` : '—';
      $('tempsub').textContent = rx.cpuTemp == null ? '' : rx.cpuTemp < 70 ? 'gezond' : rx.cpuTemp < 80 ? 'warm' : 'te heet!';
      $('tempsub').className = 'sub ' + (rx.cpuTemp == null ? '' : rx.cpuTemp < 70 ? 'good' : rx.cpuTemp < 80 ? 'warn' : 'crit');
      $('uptime').innerHTML = fmtUptime(rx.uptimeSec);
      $('uptimesub').textContent = `${rx.linesDecoded.toLocaleString('nl-NL')} regels sinds start`;
      $('lastline').textContent = rx.lastLineAt ? `laatste melding ${ago(rx.lastLineAt)}` : '';
      $('restarts').textContent = rx.decoderRestarts ?? '—';
      $('spool').textContent = `${rx.spooled} / ${rx.sendErrors}`;
      $('spoolsub').textContent = 'wachtend / verzendfouten';
    }

    const buckets = renderChart(data.linesPerHour || []);
    // "laatste uur" = som van de twee laatste buckets naar rato is overkill;
    // toon het afgelopen volle uur + lopend uur samen als indicatie
    const lastFull = buckets[buckets.length - 2]?.n ?? 0;
    const running = buckets[buckets.length - 1]?.n ?? 0;
    $('lasthour').innerHTML = `${lastFull + running}`;

    const cov = data.coverageLastHour;
    if (cov) {
      // Noemer = uitzendbare radar-meldingen (niet-uitzendbare eraf), zodat het
      // percentage echte ontvangst meet i.p.v. bron-scopeverschil.
      const excl = cov.nonBroadcastExcluded ?? 0;
      const denom = Math.max(1, cov.radar - excl);
      $('coverage').innerHTML = cov.missedByPi === 0 ? '100<small>%</small>'
        : `${Math.max(0, 100 - (100 * cov.missedByPi / denom)).toFixed(1)}<small>%</small>`;
      const base = cov.missedByPi === 0
        ? `0 gemist van ${denom}`
        : `${cov.missedByPi} gemist van ${denom}`;
      $('coveragesub').textContent = excl > 0 ? `${base} · ${excl} niet-uitzendbaar` : base;
      $('coveragesub').className = 'sub ' + (cov.missedByPi === 0 ? 'good' : cov.missedByPi <= 2 ? 'warn' : 'crit');
    }

    $('updated').textContent = 'ververst ' + HOUR_FMT.format(new Date());
    $('gen').textContent = 'server ' + (ago(data.generatedAt) ?? '—');
  } catch (err) {
    const e = $('error');
    e.style.display = 'block';
    e.textContent = 'Kan de backend niet bereiken (' + err.message + '). Is de server-kant al live? Probeer het straks opnieuw.';
    $('dot').className = 'dot critical';
    $('statustext').textContent = 'Onbekend — geen verbinding met backend';
  }
}

refresh();
setInterval(refresh, 60_000);
document.addEventListener('visibilitychange', () => { if (!document.hidden) refresh(); });
</script>
</body>
</html>
